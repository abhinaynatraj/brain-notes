<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f7f4ef" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#14130f" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="Brain Notes — jot a thought, get a crisp todo." />
    <title>Brain Notes</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Spline+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
    <script>
      // Resolve and apply the theme before first paint to avoid a flash.
      (function () {
        var t = localStorage.getItem("theme") || "system";
        var dark =
          t === "dark" ||
          (t === "system" && matchMedia("(prefers-color-scheme: dark)").matches);
        document.documentElement.dataset.theme = dark ? "dark" : "light";
      })();
    </script>
  </head>
  <body>
    <div id="app" aria-live="polite"></div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
