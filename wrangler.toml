name = "brain-notes"
main = "src/index.js"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./public"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "brain_notes"
# Run `npx wrangler d1 create brain_notes` and paste the printed id here.
# Deploy will fail until this is a real id.
database_id = "d35f6fec-2126-492d-8798-3f310342b3df"

[triggers]
crons = ["* * * * *"]

# APP_URL builds the magic-link URL that gets emailed, so it must be the
# PRODUCTION origin (it's a public URL, not a secret — it can't be a Worker
# secret because a secret and a var can't share a name). For local `wrangler
# dev`, override it to http://localhost:8787 by adding that line to .dev.vars.
[vars]
APP_URL = "https://brain-notes.abhinay-natraj.workers.dev"
